<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFest2026</title>
    <link rel="icon" type="image/jpg" href="image\Logo1.jpg">
    <link rel="stylesheet" href="css\style.css">
</head>
<body>
    <header>
        <h1><strong>Registration Here!</strong></h1>
    </header>

    
    <main>
        <section>
        <nav class="navbar">
            <a href="index.html"><strong>Home</strong></a>
            <a href="register.html"><strong>Register</strong></a>
            <a href="events.html"><strong>Events</strong></a>
            <a href="gallery.html"><strong>Gallery</strong></a>
            <a href="contact.html"><strong>Contacts</strong></a>
        </nav>
        </section>
        <h3><strong>Please provide the following details :</strong></h3>
        <form action="">
            <div class="form-row">
                <label class="form-label">Name:</label><input type="text" required><br>
            </div>
            <div class="form-row">
                <label class="form-label">Email:</label><input type="email"><br>
            </div>
            <div class="form-row">
                <label class="form-label">Telephone:</label><input type="tel"><br>
            </div>
            <div class="form-row">
                <label class="form-label">Date of Birth:</label><input type="date"><br>
            </div>
            <label class="form-label" for="gender">Gender:</label>
            <div class="radio-group" margin-bottom=12px>
                <label><input type="radio"  name="gender" checked>Male</label>
                <label><input type="radio"  name="gender">Female</label>
            </div>
            <div class="form-row">
                <label for="department">Department</label>
                <select name="department">
                    <option value="CSE">CSE</option>
                    <option value="ECE">ECE</option>
                    <option value="EEE">EEE</option>
                    <option value="ME">ME</option>
                    <option value="CE">CE</option>
                </select>
            </div>
            <label class="form-label" for="events">Events:</label><br>
                <div class="checkbox">
                    <label><input type="checkbox"  name="events">Music Festival</label>
                    <label><input type="checkbox"  name="events">Photography Contest</label>
                    <label><input type="checkbox"  name="events">Best Singer</label>
                </div>
            <div class="submit-button">
                <button name="submit" value="submit">Submit</button>
            </div>
        </form>
        
    </main>
    <footer>
        <p>ENDORA TECHFEST 2026<sup>&copy</sup></p>
    </footer>
    
</body>
</html>
