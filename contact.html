<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFest2026</title>
    <link rel="icon" type="image/jpg" href="image\Logo1.jpg">
    <link rel="stylesheet" href="css\style.css">
</head>
<body>
    <header>
        <h1><strong>Registration Here!</strong></h1>
    </header>

    <main>
         <section>
        <nav class="navbar">
            <a href="index.html"><strong>Home</strong></a>
            <a href="register.html"><strong>Register</strong></a>
            <a href="events.html"><strong>Events</strong></a>
            <a href="gallery.html"><strong>Gallery</strong></a>
            <a href="contact.html"><strong>Contacts</strong></a>
        </nav>
        </section>
        <div class="contact-container">
        <h3>Contact Us</h3>
        <p>Have a question? Send us a message below.</p>

        <form action="#" method="POST">
            
            <div class="form-row">
                <label class="form-label">Full Name:</label>
                <input type="text" id="fullName" name="fullName" required>
            </div>

            <div class="form-row">
                <label class="form-label">Email Address:</label>
                <input type="email" id="emailAddress" name="emailAddress" required>
            </div>

            <div class="form-row">
                <label class="form-label">Your Message:</label>
                <textarea id="userMessage" name="userMessage" rows="5" required></textarea>
            </div>

            <div class="form-row">
                <input type="submit" value="Send Message">
            </div>
        </form>
    </div>
        
    </main>
    <footer>
        <p>ENDORA TECHFEST 2026<sup>&copy</sup></p>
    </footer>
    
</body>
</html>
